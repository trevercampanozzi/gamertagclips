<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Clip — GamerTagClips</title>

<style>
:root{
--bg:#0b0f19;
--panel:rgba(255,255,255,.04);
--border:rgba(255,255,255,.10);
--text:#e8eefc;
--blue:#2d6cff;
--green:#61ffb0;
--red:#ff7a7a;
--gold:#ffd56a;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
background:var(--bg);
color:var(--text);
}

header{
padding:18px 16px;
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
}

nav a{
color:#9cc2ff;
text-decoration:none;
font-weight:700;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:14px;
overflow:hidden;
}

.thumb{
width:100%;
aspect-ratio:16/9;
background:#111;
object-fit:cover;
display:block;
}

.pad{
padding:16px;
}

.title{
font-weight:900;
font-size:20px;
margin-bottom:6px;
}

.sub{
opacity:.8;
font-size:14px;
margin-bottom:10px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

button{
background:var(--blue);
color:white;
border:0;
border-radius:10px;
padding:10px 14px;
font-weight:900;
cursor:pointer;
}

.shareBtn{
background:#334155;
}

.leaderboardBtn{
display:inline-block;
margin-top:12px;
background:#1e293b;
color:#fff;
text-decoration:none;
border-radius:10px;
padding:10px 14px;
font-weight:900;
}

button[disabled]{
opacity:.5;
cursor:not-allowed;
}

.msg{
margin-top:10px;
font-size:14px;
}

.ok{color:var(--green)}
.bad{color:var(--red)}

.footer{
margin-top:20px;
opacity:.7;
font-size:13px;
}

.top3Wrap{
margin-bottom:16px;
}

.top3Title{
font-size:16px;
font-weight:900;
margin:0 0 10px;
}

.top3Grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.top3Card{
display:block;
text-decoration:none;
color:var(--text);
background:var(--panel);
border:1px solid var(--border);
border-radius:12px;
padding:12px;
}

.top3Card.active{
border-color:rgba(255,213,106,.45);
box-shadow:0 0 0 1px rgba(255,213,106,.12) inset;
}

.top3Rank{
font-size:12px;
font-weight:900;
color:var(--gold);
margin-bottom:6px;
}

.top3Name{
font-size:13px;
font-weight:800;
line-height:1.2;
margin-bottom:4px;
}

.top3Votes{
font-size:12px;
opacity:.85;
}

@media (max-width:700px){
  .top3Grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
<div><strong>GamerTagClips</strong></div>
<nav>
<a href="/">Home</a> ·
<a href="/vote.html">Vote</a> ·
<a href="/submit.html">Submit</a>
</nav>
</header>

<div class="wrap">

<div class="top3Wrap">
  <div class="top3Title">🏆 Top 3 Right Now</div>
  <div id="top3Strip" class="top3Grid"></div>
  <a href="/vote.html" class="leaderboardBtn">View Full Leaderboard</a>
</div>

<div id="clipContainer"></div>

<div class="footer">
Share your clip page to get more votes.
</div>

</div>

<script>
const TOKEN_KEY = "gtcVoterToken";
const WEEK_VOTE_KEY = "gtcWeekVote";

let WEEKLY_VOTE = JSON.parse(localStorage.getItem(WEEK_VOTE_KEY) || "{}");

let CURRENT_WEEK = "";
let CLIP = null;
let ALL_CLIPS = [];
let AUTO_REFRESH_TIMER = null;

function getClipId(){
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

function ensureToken(){
  let token = localStorage.getItem(TOKEN_KEY);

  if(!token){
    token = crypto.randomUUID();
    localStorage.setItem(TOKEN_KEY, token);
  }

  return token;
}

function shareClip(){
  const url = window.location.href;
  navigator.clipboard.writeText(url);
  alert("Clip link copied! Share it to get votes.");
}

function esc(s){
  return String(s || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[m]));
}

function userVoted(){
  return WEEKLY_VOTE.week === CURRENT_WEEK;
}

function sortTop3(clips){
  return [...clips].sort((a, b) => {
    const voteDiff = Number(b.votes || 0) - Number(a.votes || 0);
    if (voteDiff !== 0) return voteDiff;

    const aTime = new Date(a.submittedAt || 0).getTime() || 0;
    const bTime = new Date(b.submittedAt || 0).getTime() || 0;
    return aTime - bTime;
  }).slice(0, 3);
}

function renderTop3Strip(){
  const el = document.getElementById("top3Strip");
  if (!el) return;

  const top3 = sortTop3(ALL_CLIPS);

  if (!top3.length) {
    el.innerHTML = `<div class="msg">No clips yet.</div>`;
    return;
  }

  el.innerHTML = top3.map((c, i) => `
    <a class="top3Card ${String(c.id) === String(CLIP?.id) ? "active" : ""}" href="/clip.html?id=${encodeURIComponent(c.id)}">
      <div class="top3Rank">#${i + 1}</div>
      <div class="top3Name">${esc(c.title || "Untitled Clip")}</div>
      <div class="top3Votes">${Number(c.votes || 0)} vote(s)</div>
    </a>
  `).join("");
}

function renderClip(){
  const c = CLIP;
  const voted = userVoted();
  const votedThis = voted && WEEKLY_VOTE.clipId === c.id;

  const container = document.getElementById("clipContainer");

  container.innerHTML = `
    <div class="card">
      ${c.thumbUrl ? `<img class="thumb" src="${esc(c.thumbUrl)}" alt="${esc(c.title)}">` : `<div class="thumb"></div>`}

      <div class="pad">
        <div class="title">${esc(c.title)}</div>

        <div class="sub">
          ${esc(c.gamerTag || "")} • ${esc(c.game || "")}
        </div>

        <div class="row">
          <div>
            <strong id="voteCount">${Number(c.votes || 0)}</strong> vote(s)
          </div>

          <div style="display:flex;gap:8px;">
            <button id="voteBtn" ${voted ? "disabled" : ""}>
              ${voted ? (votedThis ? "Voted" : "Vote Locked") : "Vote"}
            </button>

            <button class="shareBtn" onclick="shareClip()">
              Share
            </button>
          </div>
        </div>

        ${c.clipUrl ? `<div class="msg"><a href="${esc(c.clipUrl)}" target="_blank" rel="noopener">Watch Clip →</a></div>` : ""}

        <div id="msg" class="msg"></div>
      </div>
    </div>
  `;

  document.getElementById("voteBtn")?.addEventListener("click", vote);
}

function setMsg(text, type){
  const el = document.getElementById("msg");
  if(!el) return;
  el.className = "msg " + (type === "ok" ? "ok" : "bad");
  el.textContent = text;
}

function updateVoteUi(){
  const voteCountEl = document.getElementById("voteCount");
  if (voteCountEl && CLIP) {
    voteCountEl.textContent = String(Number(CLIP.votes || 0));
  }

  const btn = document.getElementById("voteBtn");
  if (!btn || !CLIP) return;

  const voted = userVoted();
  const votedThis = voted && WEEKLY_VOTE.clipId === CLIP.id;

  btn.disabled = voted;
  btn.textContent = voted ? (votedThis ? "Voted" : "Vote Locked") : "Vote";
}

async function fetchClipData(){
  const id = getClipId();

  if(!id){
    return { missingId: true };
  }

  const res = await fetch("/.netlify/functions/clips-get?t=" + Date.now(), { cache: "no-store" });
  const data = await res.json();

  const week = data.week || "";
  const clips = Array.isArray(data.clips) ? data.clips : [];
  const clip = clips.find(c => String(c.id) === String(id)) || null;

  return { week, clips, clip };
}

async function vote(){
  const btn = document.getElementById("voteBtn");

  if (userVoted()) {
    updateVoteUi();
    return;
  }

  if (!btn || !CLIP) return;

  btn.disabled = true;

  try{
    const token = ensureToken();

    const res = await fetch("/.netlify/functions/vote-post", {
      method:"POST",
      headers:{
        "content-type":"application/json",
        "x-gtc-voter":token
      },
      body:JSON.stringify({
        clipId:CLIP.id,
        week:CURRENT_WEEK
      })
    });

    const data = await res.json();

    if(!data.ok){
      setMsg(data.error || "Vote failed", "bad");
      btn.disabled = false;
      return;
    }

    CLIP.votes = Number(data.votes || 0);

    WEEKLY_VOTE = { week: CURRENT_WEEK, clipId: CLIP.id };
    localStorage.setItem(WEEK_VOTE_KEY, JSON.stringify(WEEKLY_VOTE));

    updateVoteUi();
    setMsg("Vote counted ✅", "ok");

    setTimeout(refreshLiveClip, 1200);

  }catch(e){
    setMsg("Vote failed", "bad");
    btn.disabled = false;
  }
}

async function loadClip(){
  const result = await fetchClipData();

  if (result.missingId) {
    document.getElementById("clipContainer").innerHTML = "Clip not found.";
    document.getElementById("top3Strip").innerHTML = "";
    return;
  }

  CURRENT_WEEK = result.week || "";
  ALL_CLIPS = result.clips || [];
  CLIP = result.clip;

  renderTop3Strip();

  if(!CLIP){
    document.getElementById("clipContainer").innerHTML = "Clip not found.";
    return;
  }

  renderClip();
}

async function refreshLiveClip(){
  try{
    const result = await fetchClipData();

    if (result.missingId) return;

    CURRENT_WEEK = result.week || "";
    ALL_CLIPS = result.clips || [];

    renderTop3Strip();

    if (!result.clip) return;

    CLIP = result.clip;

    const voteCountEl = document.getElementById("voteCount");
    if (voteCountEl) {
      voteCountEl.textContent = String(Number(CLIP.votes || 0));
    }

    updateVoteUi();
  }catch(e){
    // silent retry next cycle
  }
}

function startAutoRefresh(){
  if (AUTO_REFRESH_TIMER) clearInterval(AUTO_REFRESH_TIMER);
  AUTO_REFRESH_TIMER = setInterval(refreshLiveClip, 8000);
}

function stopAutoRefresh(){
  if (AUTO_REFRESH_TIMER) {
    clearInterval(AUTO_REFRESH_TIMER);
    AUTO_REFRESH_TIMER = null;
  }
}

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    stopAutoRefresh();
  } else {
    refreshLiveClip();
    startAutoRefresh();
  }
});

document.addEventListener("DOMContentLoaded", async () => {
  ensureToken();
  await loadClip();
  startAutoRefresh();
});
</script>

</body>
</html>
