<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Clip — GamerTagClips</title>

<style>

:root{
--bg:#0b0f19;
--panel:rgba(255,255,255,.04);
--border:rgba(255,255,255,.10);
--text:#e8eefc;
--blue:#2d6cff;
--green:#61ffb0;
--red:#ff7a7a;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
background:var(--bg);
color:var(--text);
}

header{
padding:18px 16px;
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
justify-content:space-between;
flex-wrap:wrap;
}

nav a{
color:#9cc2ff;
text-decoration:none;
font-weight:700;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:14px;
overflow:hidden;
}

.thumb{
width:100%;
aspect-ratio:16/9;
background:#111;
object-fit:cover;
}

.pad{
padding:16px;
}

.title{
font-weight:900;
font-size:20px;
margin-bottom:6px;
}

.sub{
opacity:.8;
font-size:14px;
margin-bottom:10px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

button{
background:var(--blue);
color:white;
border:0;
border-radius:10px;
padding:10px 14px;
font-weight:900;
cursor:pointer;
}

.shareBtn{
background:#334155;
}

.msg{
margin-top:10px;
font-size:14px;
}

.ok{color:var(--green)}
.bad{color:var(--red)}

.footer{
margin-top:20px;
opacity:.7;
font-size:13px;
}

</style>
</head>

<body>

<header>
<div><strong>GamerTagClips</strong></div>
<nav>
<a href="/">Home</a> ·
<a href="/vote.html">Vote</a> ·
<a href="/submit.html">Submit</a>
</nav>
</header>

<div class="wrap">

<div id="clipContainer"></div>

<div class="footer">
Share your clip page to get more votes.
</div>

</div>

<script>

const TOKEN_KEY="gtcVoterToken";
const WEEK_VOTE_KEY="gtcWeekVote";

let WEEKLY_VOTE=JSON.parse(localStorage.getItem(WEEK_VOTE_KEY)||"{}");

let CURRENT_WEEK="";
let CLIP=null;

function getClipId(){

const params=new URLSearchParams(window.location.search);
return params.get("id");

}

function ensureToken(){

let token=localStorage.getItem(TOKEN_KEY);

if(!token){
token=crypto.randomUUID();
localStorage.setItem(TOKEN_KEY,token);
}

return token;

}

function shareClip(){

const url=window.location.href;

navigator.clipboard.writeText(url);

alert("Clip link copied! Share it to get votes.");

}

function esc(s){
return String(s||"").replace(/[&<>"']/g,m=>({
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
'"':"&quot;",
"'":"&#39;"
}[m]));
}

function renderClip(){

const c=CLIP;

const voted=WEEKLY_VOTE.week===CURRENT_WEEK;
const votedThis=voted&&WEEKLY_VOTE.clipId===c.id;

const container=document.getElementById("clipContainer");

container.innerHTML=`

<div class="card">

${c.thumbUrl?`<img class="thumb" src="${esc(c.thumbUrl)}">`:`<div class="thumb"></div>`}

<div class="pad">

<div class="title">${esc(c.title)}</div>

<div class="sub">
${esc(c.gamerTag||"")} • ${esc(c.game||"")}
</div>

<div class="row">

<div>
<strong id="voteCount">${c.votes}</strong> vote(s)
</div>

<div style="display:flex;gap:8px;">

<button id="voteBtn" ${voted?"disabled":""}>
${voted?(votedThis?"Voted":"Vote Locked"):"Vote"}
</button>

<button class="shareBtn" onclick="shareClip()">
Share
</button>

</div>

</div>

${c.clipUrl?`<div class="msg"><a href="${esc(c.clipUrl)}" target="_blank">Watch Clip →</a></div>`:""}

<div id="msg" class="msg"></div>

</div>

</div>
`;

document.getElementById("voteBtn")?.addEventListener("click",vote);

}

function setMsg(text,type){

const el=document.getElementById("msg");
el.className="msg "+(type==="ok"?"ok":"bad");
el.textContent=text;

}

async function vote(){

const btn=document.getElementById("voteBtn");

btn.disabled=true;

try{

const token=ensureToken();

const res=await fetch("/.netlify/functions/vote-post",{

method:"POST",

headers:{
"content-type":"application/json",
"x-gtc-voter":token
},

body:JSON.stringify({
clipId:CLIP.id,
week:CURRENT_WEEK
})

});

const data=await res.json();

if(!data.ok){

setMsg(data.error||"Vote failed","bad");
btn.disabled=false;
return;

}

document.getElementById("voteCount").textContent=data.votes;

WEEKLY_VOTE={week:CURRENT_WEEK,clipId:CLIP.id};

localStorage.setItem(WEEK_VOTE_KEY,JSON.stringify(WEEKLY_VOTE));

btn.textContent="Voted";

setMsg("Vote counted ✅","ok");

}catch(e){

setMsg("Vote failed","bad");
btn.disabled=false;

}

}

async function loadClip(){

const id=getClipId();

if(!id){
document.getElementById("clipContainer").innerHTML="Clip not found.";
return;
}

const res=await fetch("/.netlify/functions/clips-get?t="+Date.now());
const data=await res.json();

CURRENT_WEEK=data.week;

const clips=data.clips||[];

CLIP=clips.find(c=>String(c.id)===String(id));

if(!CLIP){
document.getElementById("clipContainer").innerHTML="Clip not found.";
return;
}

renderClip();

}

document.addEventListener("DOMContentLoaded",()=>{

ensureToken();
loadClip();

});

</script>

</body>
</html>
