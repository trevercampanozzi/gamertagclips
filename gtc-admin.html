<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin | GamerTagClips</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{
--bg:#0f1117;
--card:#151a24;
--border:#232a3a;
--text:#fff;
--muted:#b6c0d0;
--good:#22c55e;
--bad:#ef4444;
--warn:#f59e0b;
--btn:#2563eb;
--btn2:#0b1220;
--danger:#b91c1c;
--danger2:#7f1d1d;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:var(--text)
}

.wrap{
max-width:1100px;
margin:auto;
padding:26px 16px 60px
}

h1{margin:0 0 8px;font-size:26px}
h2{margin:0 0 12px;font-size:18px}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
padding:16px;
margin:12px 0
}

button{
background:var(--btn);
color:#fff;
border:0;
border-radius:12px;
padding:10px 12px;
font-weight:800;
cursor:pointer
}

button.secondary{background:#334155}
button.danger{background:var(--danger)}
button.warn{background:#a16207}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px
}

.keys{
white-space:pre-wrap;
font-family:monospace;
color:var(--muted);
font-size:12px;
margin-top:10px
}

.clip{
border-bottom:1px solid var(--border);
padding:10px 0
}

.live{
font-size:30px;
font-weight:bold;
margin-top:6px
}

</style>
</head>

<body>

<div class="wrap">

<div class="row" style="justify-content:space-between;margin-bottom:10px;">
<h1>Admin Dashboard</h1>
<button class="secondary" onclick="window.open('/','_blank')">
Open Site
</button>
</div>

<div class="card" id="loginCard">

<h2>Login</h2>

<input id="pw" type="password" placeholder="Admin password">

<div class="row" style="margin-top:10px">
<button id="loginBtn">Login</button>
<span id="loginMsg"></span>
</div>

</div>

<div id="toolsWrap" style="display:none">

<div class="grid">

<div class="card">

<h2>Session</h2>

<button id="logoutBtn" class="secondary">Logout</button>

<div id="toolsMsg"></div>

</div>

<div class="card">

<h2>Live Visitors</h2>

<div id="liveUsers" class="live">—</div>

<div style="color:#9ca3af;font-size:13px">
Active visitors right now
</div>

<button id="refreshTrafficBtn" class="secondary" style="margin-top:10px">
Refresh
</button>

</div>

</div>

<div class="card">

<h2>Weeks</h2>

<div class="row">

<button id="listWeeksBtn" class="secondary">
List weeks
</button>

<button id="resetWeekBtn" class="warn">
Reset current week
</button>

</div>

</div>

<div class="card">

<h2>Current Week Clips</h2>

<div class="row">
<button id="loadClipsBtn" class="secondary">
Refresh clips
</button>
</div>

<div id="clipsList"></div>

</div>

<div class="card">

<h2>Delete Clip</h2>

<label>Clip ID</label>
<input id="clipId">

<label>Week (optional)</label>
<input id="week">

<div class="row" style="margin-top:10px">
<button id="deleteClipBtn" class="secondary">
Delete clip
</button>
</div>

</div>

<div class="card">

<h2>Output</h2>

<div id="weeksOut" class="keys"></div>

</div>

<div class="card">

<h2>Danger Zone</h2>

<div style="margin-bottom:14px">

<h3>Factory Reset</h3>

<button id="factoryResetBtn" class="danger">
Factory Reset Test Data
</button>

</div>

<div>

<h3>Purge All Weeks</h3>

<button id="purgeAllBtn" class="danger">
Purge ALL weeks
</button>

</div>

</div>

</div>

</div>

<script>

let token = localStorage.getItem("gtc_admin_token") || "";

const loginCard = document.getElementById("loginCard");
const toolsWrap = document.getElementById("toolsWrap");

const pw = document.getElementById("pw");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

const loginMsg = document.getElementById("loginMsg");
const toolsMsg = document.getElementById("toolsMsg");

const listWeeksBtn = document.getElementById("listWeeksBtn");
const resetWeekBtn = document.getElementById("resetWeekBtn");
const purgeAllBtn = document.getElementById("purgeAllBtn");
const factoryResetBtn = document.getElementById("factoryResetBtn");

const clipId = document.getElementById("clipId");
const week = document.getElementById("week");
const deleteClipBtn = document.getElementById("deleteClipBtn");

const weeksOut = document.getElementById("weeksOut");

const loadClipsBtn = document.getElementById("loadClipsBtn");
const clipsList = document.getElementById("clipsList");

const liveUsers = document.getElementById("liveUsers");
const refreshTrafficBtn = document.getElementById("refreshTrafficBtn");

function showTools(){

loginCard.style.display = token ? "none":"";
toolsWrap.style.display = token ? "":"none";

}

async function api(path,method="GET",body=null){

const opts={method,headers:{}};

if(token)
opts.headers["authorization"]="Bearer "+token;

if(body){

opts.headers["content-type"]="application/json";
opts.body=JSON.stringify(body);

}

const res=await fetch(path,opts);

const data=await res.json();

return {res,data};

}

async function login(){

const password=pw.value.trim();

if(!password){

loginMsg.textContent="Enter password";

return;

}

const {res,data}=await api("/.netlify/functions/admin-login","POST",{password});

if(!res.ok){

loginMsg.textContent="Login failed";

return;

}

token=data.token;

localStorage.setItem("gtc_admin_token",token);

showTools();

}

loginBtn.onclick=login;

logoutBtn.onclick=()=>{

token="";
localStorage.removeItem("gtc_admin_token");

showTools();

};

listWeeksBtn.onclick=async ()=>{

const {data}=await api("/.netlify/functions/admin-list-weeks");

weeksOut.textContent=(data.keys||[]).join("\n");

};

resetWeekBtn.onclick=async ()=>{

if(prompt("Type RESET WEEK")!=="RESET WEEK") return;

await api("/.netlify/functions/admin-reset-week","POST",{});

toolsMsg.textContent="Week reset";

};

purgeAllBtn.onclick=async ()=>{

if(prompt("Type PURGE")!=="PURGE") return;

await api("/.netlify/functions/admin-purge-all","POST",{});

toolsMsg.textContent="Weeks purged";

};

factoryResetBtn.onclick=async ()=>{

if(prompt("Type RESET ALL DATA")!=="RESET ALL DATA") return;

await api("/.netlify/functions/admin-factory-reset","POST",{confirmText:"RESET ALL DATA"});

toolsMsg.textContent="Factory reset complete";

};

deleteClipBtn.onclick=async ()=>{

const id=clipId.value.trim();

if(!id){

toolsMsg.textContent="clipId required";

return;

}

const payload={clipId:id};

if(week.value.trim())
payload.week=week.value.trim();

await api("/.netlify/functions/admin-delete-clip","POST",payload);

toolsMsg.textContent="Clip removed";

};

loadClipsBtn.onclick=async ()=>{

clipsList.innerHTML="Loading...";

const {data}=await api("/.netlify/functions/clips-get");

const clips=data.clips||[];

if(!clips.length){

clipsList.innerHTML="No clips yet.";

return;

}

clipsList.innerHTML=clips.map(c=>`

<div class="clip">

<strong>${c.title}</strong>

${c.gamerTag} • ${c.game}<br>

Votes: ${c.votes}<br>

ID: ${c.id}

</div>

`).join("");

};

async function loadTraffic(){

try{

const res = await fetch("https://api.countapi.xyz/hit/gamertagclips/live");

const data = await res.json();

liveUsers.textContent = data.value;

}catch{

liveUsers.textContent="—";

}

}

refreshTrafficBtn.onclick=loadTraffic;

loadTraffic();

showTools();

</script>

</body>
</html>
