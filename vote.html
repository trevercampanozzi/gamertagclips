<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vote — GamerTagClips</title>

  <style>
    :root{
      --bg:#0b0f19;
      --panel:rgba(255,255,255,.04);
      --border:rgba(255,255,255,.10);
      --text:#e8eefc;
      --muted:rgba(232,238,252,.78);
      --blue:#2d6cff;
      --green:#61ffb0;
      --red:#ff7a7a;
      --gold:#ffd56a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    header{
      padding:18px 16px;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    header strong{letter-spacing:.2px}
    nav a{
      color:#9cc2ff;
      text-decoration:none;
      font-weight:700;
    }
    nav a:hover{text-decoration:underline}
    .wrap{max-width:1100px;margin:0 auto;padding:16px}

    .meta{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      opacity:.92;
      margin:10px 0 18px;
    }
    .meta-left{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .pill{
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
      color:var(--text);
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:16px 0 10px;
      flex-wrap:wrap;
    }
    .section-title h2{
      margin:0;
      font-size:16px;
      letter-spacing:.2px;
    }
    .section-title .hint{
      opacity:.78;
      font-size:12px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:12px;
    }

    .card{
      background:var(--panel);
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      overflow:hidden;
    }
    .card.leader{
      border-color: rgba(255,213,106,.35);
      box-shadow: 0 0 0 1px rgba(255,213,106,.08) inset;
    }

    .thumb{
      width:100%;
      aspect-ratio:16/9;
      background:#111;
      display:block;
      object-fit:cover;
    }
    .pad{padding:12px}
    .title{
      font-weight:900;
      margin:0 0 6px;
      font-size:16px;
      line-height:1.2;
      word-break:break-word;
    }
    .sub{
      opacity:.82;
      font-size:13px;
      margin:0 0 10px;
    }
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .rank{
      font-weight:900;
      color:var(--gold);
    }
    button{
      background:var(--blue);
      color:white;
      border:0;
      border-radius:10px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
    }
    button[disabled]{opacity:.55;cursor:not-allowed}
    .msg{margin-top:10px;font-size:13px}
    .ok{color:var(--green)}
    .bad{color:var(--red)}
    .footer{
      opacity:.7;
      margin:18px 0 0;
      font-size:12px;
      line-height:1.35;
    }
    .link{
      color:#9cc2ff;
      text-decoration:none;
      font-weight:800;
    }
    .link:hover{text-decoration:underline}
  </style>
</head>

<body>
  <header>
    <div><strong>GamerTagClips</strong> — Vote</div>
    <nav>
      <a href="/">Home</a> ·
      <a href="/submit.html">Submit</a>
    </nav>
  </header>

  <div class="wrap">
    <div class="meta">
      <div class="meta-left">
        <span class="pill" id="weekPill">Week: …</span>
        <span class="pill" id="countPill">Clips: …</span>
      </div>
      <span class="pill" id="statusPill">Loading…</span>
    </div>

    <div class="section-title">
      <h2>🥇🥈🥉 Top 3 This Week</h2>
      <div class="hint">Highest votes (ties break by newest submission).</div>
    </div>
    <div class="grid" id="topGrid"></div>

    <div class="section-title">
      <h2>🗂️ All Clips (Newest First)</h2>
      <div class="hint" id="allHint">Excludes the Top 3 so nothing is duplicated.</div>
    </div>
    <div class="grid" id="allGrid"></div>

    <div class="footer">
      Voting is rate-limited per clip per IP.
    </div>
  </div>

<script>
  const weekPill = document.getElementById('weekPill');
  const countPill = document.getElementById('countPill');
  const statusPill = document.getElementById('statusPill');

  const topGrid = document.getElementById('topGrid');
  const allGrid = document.getElementById('allGrid');
  const allHint = document.getElementById('allHint');

  let CURRENT_WEEK = "";

  let CLIPS_BY_ID = new Map();
  let VOTED_THIS_SESSION = new Set(
    JSON.parse(localStorage.getItem("gtcVotedClips") || "[]")
  );

  function esc(s){
    return String(s||"").replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
  }

  function setStatus(text, kind){
    statusPill.textContent = text;
    statusPill.style.borderColor = 'rgba(255,255,255,.10)';
    if(kind === 'ok') statusPill.style.borderColor = 'rgba(97,255,176,.35)';
    if(kind === 'bad') statusPill.style.borderColor = 'rgba(255,122,122,.35)';
  }

  function toMs(d){
    const t = Date.parse(d);
    return Number.isFinite(t) ? t : 0;
  }

  function normalizeClip(c){
    return {
      id: c.id,
      title: c.title || 'Untitled Clip',
      gamerTag: c.gamerTag || c.gamertag || '',
      game: c.game || '',
      votes: Number(c.votes || 0),
      submittedAt: c.submittedAt || c.createdAt || '',
      thumbUrl: c.thumbUrl || c.thumbnail || '',
      clipUrl: c.clipUrl || c.url || ''
    };
  }

  function renderCard(c, opts){
    const id = esc(c.id);
    const title = esc(c.title);
    const gamerTag = esc(c.gamerTag);
    const game = esc(c.game);
    const votes = Number(c.votes || 0);

    const thumbUrl = c.thumbUrl || '';
    const clipUrl = c.clipUrl || '';

    const rankHtml = (opts && opts.rank)
      ? `<span class="pill"><span class="rank">#${opts.rank}</span></span>`
      : '';

    const leaderClass = (opts && opts.leader) ? 'leader' : '';
    const disabledAttr = VOTED_THIS_SESSION.has(String(c.id)) ? 'disabled' : '';

    const el = document.createElement('div');
    el.className = `card ${leaderClass}`.trim();
    el.innerHTML = `
      ${thumbUrl ? `<img class="thumb" src="${esc(thumbUrl)}" alt="${title}">` : `<div class="thumb"></div>`}
      <div class="pad">
        <p class="title">${title}</p>
        <p class="sub">${[gamerTag && `@${gamerTag}`, game].filter(Boolean).join(' • ')}</p>

        <div class="row">
          <span class="pill">
            ${rankHtml}
            <strong class="voteCount" id="vc-${id}">${votes}</strong> vote(s)
          </span>
          <button data-id="${id}" ${disabledAttr}>Vote</button>
        </div>

        ${clipUrl ? `<div class="msg"><a class="link" href="${esc(clipUrl)}" target="_blank" rel="noopener">Watch clip →</a></div>` : ``}
        <div class="msg" id="m-${id}"></div>
      </div>
    `;
    return el;
  }

  function wireVotes(container){
    container.querySelectorAll('button[data-id]').forEach(btn => {
      btn.addEventListener('click', () => vote(btn));
    });
  }

  async function loadClips(){
    setStatus('Loading…', null);
    topGrid.innerHTML = '';
    allGrid.innerHTML = '';
    allHint.textContent = 'Excludes the Top 3 so nothing is duplicated.';

    const res = await fetch(`/.netlify/functions/clips-get?t=${Date.now()}`, {
      cache: "no-store"
    });
    const data = await res.json();

    CURRENT_WEEK = data.week || "";
    weekPill.textContent = `Week: ${data.week || '—'}`;
    countPill.textContent = `Clips: ${data.count ?? '—'}`;

    if (!data.clips || !data.clips.length) {
      setStatus('No clips yet', 'bad');

      const emptyHtml = `
        <div class="card">
          <div class="pad">
            <p class="title">No clips yet</p>
            <p class="sub">Submit a clip so we have something to vote on.</p>
            <a class="link" href="/submit.html">Submit a clip →</a>
          </div>
        </div>
      `;
      topGrid.innerHTML = emptyHtml;
      allGrid.innerHTML = emptyHtml;
      return;
    }

    setStatus('Ready to vote', 'ok');

    const clips = data.clips.map(normalizeClip);

    CLIPS_BY_ID = new Map();
    clips.forEach(c => CLIPS_BY_ID.set(String(c.id), c));

    const top3 = [...clips].sort((a,b) => {
      const dv = (Number(b.votes)||0) - (Number(a.votes)||0);
      if(dv !== 0) return dv;
      return toMs(b.submittedAt) - toMs(a.submittedAt);
    }).slice(0, 3);

    const topIds = new Set(top3.map(c => String(c.id)));

    const allSorted = [...clips]
      .filter(c => !topIds.has(String(c.id)))
      .sort((a,b) => {
        const ds = toMs(b.submittedAt) - toMs(a.submittedAt);
        if(ds !== 0) return ds;
        return (Number(b.votes)||0) - (Number(a.votes)||0);
      });

    allHint.textContent = `Excludes the Top 3 so nothing is duplicated. (${allSorted.length} clip${allSorted.length===1?'':'s'} below)`;

    topGrid.innerHTML = '';
    top3.forEach((c, i) => topGrid.appendChild(renderCard(c, { rank: i + 1, leader: true })));

    allGrid.innerHTML = '';
    allSorted.forEach(c => allGrid.appendChild(renderCard(c, { leader: false })));

    wireVotes(topGrid);
    wireVotes(allGrid);
  }

  function setMsg(clipId, text, kind){
    const msg = document.getElementById(`m-${clipId}`);
    if(!msg) return;
    msg.className = 'msg ' + (kind === 'ok' ? 'ok' : (kind === 'bad' ? 'bad' : ''));
    msg.textContent = text || '';
  }

  function setVoteCount(clipId, votes){
    const el = document.getElementById(`vc-${clipId}`);
    if(el) el.textContent = String(Number(votes || 0));
  }

  function disableAllVoteButtonsForClip(clipId){
    document.querySelectorAll(`button[data-id="${CSS.escape(String(clipId))}"]`).forEach(b => {
      b.disabled = true;
    });
  }

  async function vote(btn){
    const clipId = btn.getAttribute('data-id');
    if(!clipId) return;

    if(VOTED_THIS_SESSION.has(String(clipId))){
      setMsg(clipId, 'Vote already counted recently. Try later.', 'bad');
      disableAllVoteButtonsForClip(clipId);
      return;
    }

    const clip = CLIPS_BY_ID.get(String(clipId));
    const before = clip ? Number(clip.votes || 0) : Number(document.getElementById(`vc-${clipId}`)?.textContent || 0);
    const optimistic = before + 1;

    setVoteCount(clipId, optimistic);
    setMsg(clipId, 'Counting vote…', null);

    disableAllVoteButtonsForClip(clipId);

    try{
      const res = await fetch('/.netlify/functions/vote-post', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ clipId, week: CURRENT_WEEK })
      });
      const data = await res.json();

      if (!res.ok || data.ok === false) {
        setVoteCount(clipId, before);
        setMsg(clipId, data.error || 'Vote failed', 'bad');

        if(String(data.error || '').toLowerCase().includes('already')){
          VOTED_THIS_SESSION.add(String(clipId));
          localStorage.setItem("gtcVotedClips", JSON.stringify([...VOTED_THIS_SESSION]));
          disableAllVoteButtonsForClip(clipId);
        } else {
          setTimeout(() => {
            document.querySelectorAll(`button[data-id="${CSS.escape(String(clipId))}"]`).forEach(b => {
              b.disabled = false;
            });
          }, 1200);
        }
        return;
      }

      const serverVotes = (data.votes != null) ? Number(data.votes) : optimistic;
      if(clip) clip.votes = serverVotes;

      setVoteCount(clipId, serverVotes);
      setMsg(clipId, 'Vote counted ✅', 'ok');

      VOTED_THIS_SESSION.add(String(clipId));
      localStorage.setItem("gtcVotedClips", JSON.stringify([...VOTED_THIS_SESSION]));
      disableAllVoteButtonsForClip(clipId);

    } catch(e){
      setVoteCount(clipId, before);
      setMsg(clipId, 'Vote failed. Try again.', 'bad');

      setTimeout(() => {
        document.querySelectorAll(`button[data-id="${CSS.escape(String(clipId))}"]`).forEach(b => {
          b.disabled = false;
        });
      }, 1200);
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    loadClips();
  });
</script>
</body>
</html>
