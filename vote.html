<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vote — GamerTagClips</title>

<style>
:root{
--bg:#0b0f19;
--panel:rgba(255,255,255,.04);
--border:rgba(255,255,255,.10);
--text:#e8eefc;
--muted:rgba(232,238,252,.78);
--blue:#2d6cff;
--green:#61ffb0;
--red:#ff7a7a;
--gold:#ffd56a;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
background:var(--bg);
color:var(--text);
}

header{
padding:18px 16px;
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

nav a{
color:#9cc2ff;
text-decoration:none;
font-weight:700;
}

.wrap{
max-width:1100px;
margin:auto;
padding:16px;
}

.meta{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
margin-bottom:18px;
gap:8px;
}

.pill{
font-size:12px;
padding:6px 10px;
border-radius:999px;
background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.10);
}

.section-title{
margin:20px 0 10px;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:12px;
}

.card{
background:var(--panel);
border:1px solid rgba(255,255,255,.08);
border-radius:14px;
overflow:hidden;
}

.card.leader{
border-color:rgba(255,213,106,.35);
}

.thumb{
width:100%;
aspect-ratio:16/9;
background:#111;
object-fit:cover;
display:block;
}

.pad{
padding:12px;
}

.title{
font-weight:900;
margin:0 0 6px;
}

.sub{
opacity:.8;
font-size:13px;
margin-bottom:10px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.rank{
color:var(--gold);
font-weight:900;
}

button{
background:var(--blue);
color:white;
border:0;
border-radius:10px;
padding:10px 12px;
font-weight:900;
cursor:pointer;
}

.shareBtn{
background:#334155;
}

button[disabled]{
opacity:.5;
cursor:not-allowed;
}

.msg{
margin-top:8px;
font-size:13px;
}

.ok{color:var(--green)}
.bad{color:var(--red)}

.footer{
opacity:.7;
margin-top:20px;
font-size:12px;
}
</style>
</head>

<body>

<header>
<div><strong>GamerTagClips</strong> — Vote</div>
<nav>
<a href="/">Home</a> ·
<a href="/submit.html">Submit</a>
</nav>
</header>

<div class="wrap">

<div class="meta">
<span class="pill" id="weekPill">Week: …</span>
<span class="pill" id="countPill">Clips: …</span>
<span class="pill" id="statusPill">Loading…</span>
</div>

<div class="section-title">
<h2>🥇🥈🥉 Top 3 This Week</h2>
</div>

<div class="grid" id="topGrid"></div>

<div class="section-title">
<h2>🗂️ All Clips (Newest First)</h2>
</div>

<div class="grid" id="allGrid"></div>

<div class="footer">
Voting limited to one vote per week per device.
</div>

</div>

<script>
const weekPill = document.getElementById("weekPill");
const countPill = document.getElementById("countPill");
const statusPill = document.getElementById("statusPill");

const topGrid = document.getElementById("topGrid");
const allGrid = document.getElementById("allGrid");

let CURRENT_WEEK = "";
let CLIPS_BY_ID = new Map();
let AUTO_REFRESH_TIMER = null;

const TOKEN_KEY = "gtcVoterToken";
const WEEK_VOTE_KEY = "gtcWeekVote";

let WEEKLY_VOTE = JSON.parse(localStorage.getItem(WEEK_VOTE_KEY) || "{}");

function ensureToken(){
  let token = localStorage.getItem(TOKEN_KEY);
  if(!token){
    token = crypto.randomUUID();
    localStorage.setItem(TOKEN_KEY, token);
  }
  return token;
}

function esc(s){
  return String(s || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[m]));
}

function setStatus(text){
  statusPill.textContent = text;
}

function userVoted(){
  return WEEKLY_VOTE.week === CURRENT_WEEK;
}

function lockVotes(){
  document.querySelectorAll("button.voteBtn").forEach(b => {
    b.disabled = true;
    b.textContent = "Vote Locked";
  });

  if (WEEKLY_VOTE.clipId) {
    document.querySelectorAll(`button[data-id="${WEEKLY_VOTE.clipId}"]`).forEach(b => {
      b.textContent = "Voted";
    });
  }
}

function shareClip(id){
  const url = `${window.location.origin}/clip.html?id=${id}`;
  navigator.clipboard.writeText(url);
  alert("Clip link copied! Share it to get votes.");
}

function renderCard(c, rank){
  const id = esc(c.id);
  const voted = userVoted();
  const votedThis = voted && WEEKLY_VOTE.clipId === c.id;

  const el = document.createElement("div");
  el.className = "card" + (rank ? " leader" : "");

  el.innerHTML = `
    ${c.thumbUrl ? `<img class="thumb" src="${esc(c.thumbUrl)}" alt="${esc(c.title)}">` : `<div class="thumb"></div>`}

    <div class="pad">
      <p class="title">${esc(c.title)}</p>

      <p class="sub">${esc(c.gamerTag || "")} • ${esc(c.game || "")}</p>

      <div class="row">
        <span class="pill">
          ${rank ? `<span class="rank">#${rank}</span>` : ""}
          <strong id="vc-${id}">${Number(c.votes || 0)}</strong> votes
        </span>

        <div style="display:flex;gap:6px;">
          <button class="voteBtn" data-id="${id}" ${voted ? "disabled" : ""}>
            ${voted ? (votedThis ? "Voted" : "Vote Locked") : "Vote"}
          </button>

          <button class="shareBtn" onclick="shareClip('${id}')">
            Share
          </button>
        </div>
      </div>

      <div class="msg" id="pressure-${id}"></div>

      ${c.clipUrl ? `<div class="msg"><a href="${esc(c.clipUrl)}" target="_blank" rel="noopener">Watch Clip →</a></div>` : ""}

      <div class="msg" id="m-${id}"></div>
    </div>
  `;

  return el;
}

function wireVotes(container){
  container.querySelectorAll(".voteBtn").forEach(btn => {
    btn.onclick = () => vote(btn);
  });
}

function applyLeaderboardPressure(clips){
  if (clips.length < 3) {
    clips.forEach(c => {
      const el = document.getElementById(`pressure-${c.id}`);
      if (el) el.innerHTML = "";
    });
    return;
  }

  const sorted = [...clips].sort((a, b) => {
    const voteDiff = Number(b.votes || 0) - Number(a.votes || 0);
    if (voteDiff !== 0) return voteDiff;

    const aTime = new Date(a.submittedAt || 0).getTime() || 0;
    const bTime = new Date(b.submittedAt || 0).getTime() || 0;
    return aTime - bTime;
  });

  const leaderVotes = Number(sorted[0].votes || 0);
  const thirdVotes = Number(sorted[2].votes || 0);

  clips.forEach(c => {
    const el = document.getElementById(`pressure-${c.id}`);
    if (!el) return;

    const votes = Number(c.votes || 0);
    const diff = thirdVotes - votes + 1;

    if (votes >= thirdVotes) {
      el.innerHTML = `🔥 Leader: ${leaderVotes} votes`;
    } else {
      el.innerHTML = `📈 Need ${diff} vote${diff === 1 ? "" : "s"} to reach Top 3`;
    }
  });
}

function sortForTop3(clips){
  return [...clips].sort((a, b) => {
    const voteDiff = Number(b.votes || 0) - Number(a.votes || 0);
    if (voteDiff !== 0) return voteDiff;

    const aTime = new Date(a.submittedAt || 0).getTime() || 0;
    const bTime = new Date(b.submittedAt || 0).getTime() || 0;
    return aTime - bTime;
  }).slice(0, 3);
}

function sortForRest(clips, topIds){
  return [...clips]
    .filter(c => !topIds.has(String(c.id)))
    .sort((a, b) => {
      const bTime = new Date(b.submittedAt || 0).getTime() || 0;
      const aTime = new Date(a.submittedAt || 0).getTime() || 0;
      return bTime - aTime;
    });
}

function renderAll(clips){
  CLIPS_BY_ID = new Map();
  clips.forEach(c => CLIPS_BY_ID.set(String(c.id), c));

  const top = sortForTop3(clips);
  const topIds = new Set(top.map(c => String(c.id)));
  const rest = sortForRest(clips, topIds);

  topGrid.innerHTML = "";
  top.forEach((c, i) => topGrid.appendChild(renderCard(c, i + 1)));

  allGrid.innerHTML = "";
  rest.forEach(c => allGrid.appendChild(renderCard(c)));

  wireVotes(topGrid);
  wireVotes(allGrid);
  applyLeaderboardPressure(clips);

  if(userVoted()){
    lockVotes();
    setStatus("Vote already cast this week");
  }else{
    setStatus("Ready to vote");
  }
}

async function fetchClipsData(){
  const res = await fetch(`/.netlify/functions/clips-get?t=${Date.now()}`, { cache: "no-store" });
  return res.json();
}

async function loadClips(){
  const data = await fetchClipsData();

  CURRENT_WEEK = data.week || "";
  weekPill.textContent = `Week: ${data.week || "—"}`;
  countPill.textContent = `Clips: ${data.count ?? 0}`;

  const clips = Array.isArray(data.clips) ? data.clips : [];
  renderAll(clips);
}

async function refreshLiveVotes(){
  try{
    const data = await fetchClipsData();

    if ((data.week || "") !== CURRENT_WEEK) {
      CURRENT_WEEK = data.week || "";
      weekPill.textContent = `Week: ${data.week || "—"}`;
    }

    countPill.textContent = `Clips: ${data.count ?? 0}`;

    const freshClips = Array.isArray(data.clips) ? data.clips : [];

    const currentIds = Array.from(CLIPS_BY_ID.keys()).sort().join("|");
    const freshIds = freshClips.map(c => String(c.id)).sort().join("|");

    if (currentIds !== freshIds) {
      renderAll(freshClips);
      return;
    }

    const currentTopIds = sortForTop3(Array.from(CLIPS_BY_ID.values())).map(c => String(c.id)).join("|");
    const freshTopIds = sortForTop3(freshClips).map(c => String(c.id)).join("|");

    if (currentTopIds !== freshTopIds) {
      renderAll(freshClips);
      return;
    }

    CLIPS_BY_ID = new Map();
    freshClips.forEach(c => CLIPS_BY_ID.set(String(c.id), c));

    freshClips.forEach(c => {
      const id = String(c.id);
      const vc = document.getElementById(`vc-${id}`);
      if (vc) vc.textContent = String(Number(c.votes || 0));
    });

    applyLeaderboardPressure(freshClips);

    if (userVoted()) {
      lockVotes();
      setStatus("Vote already cast this week");
    } else {
      setStatus("Live updates active");
    }
  }catch(e){
    setStatus("Live update retrying…");
  }
}

function startAutoRefresh(){
  if (AUTO_REFRESH_TIMER) clearInterval(AUTO_REFRESH_TIMER);
  AUTO_REFRESH_TIMER = setInterval(refreshLiveVotes, 8000);
}

function stopAutoRefresh(){
  if (AUTO_REFRESH_TIMER) {
    clearInterval(AUTO_REFRESH_TIMER);
    AUTO_REFRESH_TIMER = null;
  }
}

function setVoteCount(id, v){
  const el = document.getElementById(`vc-${id}`);
  if(el) el.textContent = v;
}

function setMsg(id, msg, type){
  const el = document.getElementById(`m-${id}`);
  if(!el) return;
  el.className = "msg " + (type === "ok" ? "ok" : "bad");
  el.textContent = msg;
}

async function vote(btn){
  if(userVoted()){
    lockVotes();
    return;
  }

  const id = btn.getAttribute("data-id");
  btn.disabled = true;

  try{
    const token = ensureToken();

    const res = await fetch("/.netlify/functions/vote-post", {
      method:"POST",
      headers:{
        "content-type":"application/json",
        "x-gtc-voter":token
      },
      body:JSON.stringify({ clipId:id, week:CURRENT_WEEK })
    });

    const data = await res.json();

    if(!data.ok){
      setMsg(id, data.error || "Vote failed", "bad");
      btn.disabled = false;
      return;
    }

    setVoteCount(id, data.votes);

    WEEKLY_VOTE = { week: CURRENT_WEEK, clipId: id };
    localStorage.setItem(WEEK_VOTE_KEY, JSON.stringify(WEEKLY_VOTE));

    setMsg(id, "Vote counted ✅", "ok");
    setStatus("Vote already cast this week");
    lockVotes();

    setTimeout(refreshLiveVotes, 1200);

  }catch(e){
    setMsg(id, "Vote failed", "bad");
    btn.disabled = false;
  }
}

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    stopAutoRefresh();
  } else {
    refreshLiveVotes();
    startAutoRefresh();
  }
});

document.addEventListener("DOMContentLoaded", async () => {
  ensureToken();
  await loadClips();
  startAutoRefresh();
});
</script>

</body>
</html>
